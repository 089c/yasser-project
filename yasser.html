<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة أبو ميلينيا</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* الخلفية المأخوذة من الصورة */
        .background {
            background-color: #7289da; /* لون ديسكورد الأساسي */
            background-image: url('https://i.postimg.cc/85M2RjKx/How-To-Get-Your-Discord-Token.png'); /* رابط الصورة الأصلية */
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* المربع الأبيض في المنتصف */
        .content-card {
            background-color: white;
            padding: 40px 60px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            /* لإنزال الكلام والزر قليلاً لتحت */
            margin-top: 150px; 
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #2c2f33;
            margin-bottom: 25px;
            font-size: 2.5rem;
        }

        /* تنسيق الزر */
        .main-btn {
            background-color: transparent;
            color: #2c2f33;
            border: 2px solid #ccc;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .main-btn:hover {
            background-color: #f1f1f1;
            border-color: #7289da;
            transform: translateY(-2px);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="background">
        <div class="content-card">
            <h1>أبو ميلينيا</h1>
            
            <a href="#" class="main-btn">اضغط هنا</a>

            <div class="footer-text">
                تم البرمجة بواسطة AI برعاية Discord
            </div>
        </div>
    </div>

</body>
</html>
